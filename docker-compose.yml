version: "3.9"

services:
  app:
    build: .
    container_name: rag_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma
    container_name: chroma_db
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_db:/chroma/chroma